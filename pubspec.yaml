name: flutter_chat_app
description: Professional Firebase Chat Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Navigation


  # Image Handling
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
 
  intl: ^0.18.1
  timeago: ^3.6.0
  uuid: ^4.2.2
  permission_handler: ^11.1.0
 
  video_player: ^2.8.1

  # Utils
  dartz: ^0.10.1
 
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
